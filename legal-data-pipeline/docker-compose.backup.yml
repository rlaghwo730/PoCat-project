services:
  postgres:
    image: postgres:16
    container_name: silson_legal_postgres
    environment:
      POSTGRES_USER: silson
      POSTGRES_PASSWORD: silson_pw
      POSTGRES_DB: silson_legal_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  postgres_data: