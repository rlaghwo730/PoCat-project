name: Refresh Neon Legal Retrieval DB

on:
  workflow_dispatch:
  schedule:
    # 매주 월요일 03:00 KST
    # GitHub Actions cron은 UTC 기준
    # 일요일 18:00 UTC = 월요일 03:00 KST
    - cron: "0 18 * * 0"

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    env:
      POSTGRES_HOST: ${{ secrets.POSTGRES_HOST }}
      POSTGRES_PORT: ${{ secrets.POSTGRES_PORT }}
      POSTGRES_DB: ${{ secrets.POSTGRES_DB }}
      POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      POSTGRES_SSLMODE: require

      LAW_API_OC: ${{ secrets.LAW_API_OC }}
      LAW_API_KEY: ${{ secrets.LAW_API_OC }}

      EMBEDDING_MODEL: sentence-transformers/paraphrase-multilingual-MiniLM-L12-v2
      EMBEDDING_BATCH_SIZE: 64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        working-directory: legal-data-pipeline
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Check environment
        working-directory: legal-data-pipeline
        run: |
          python src/check_env.py

      - name: Check DB connection
        working-directory: legal-data-pipeline
        run: |
          python src/test_db_connection.py

      - name: Load legal source inventory
        working-directory: legal-data-pipeline
        run: |
          python src/load_inventory.py

      - name: Refresh legal API metadata
        working-directory: legal-data-pipeline
        run: |
          python src/collect_legal_api.py

      - name: Refresh legal body articles and attachments
        working-directory: legal-data-pipeline
        run: |
          python src/collect_legal_body.py

      - name: Parse external reference documents
        working-directory: legal-data-pipeline
        run: |
          python src/parse_external_docs.py

      - name: Build retrieval chunk registry
        working-directory: legal-data-pipeline
        run: |
          python src/build_retrieval_registry.py

      - name: Rebuild unified retrieval chunks
        working-directory: legal-data-pipeline
        run: |
          python src/integrated/build_unified_retrieval_chunk.py

      - name: Backfill source URLs and citations
        working-directory: legal-data-pipeline
        run: |
          python src/integrated/backfill_source_urls.py

      - name: Upsert pgvector embeddings
        working-directory: legal-data-pipeline
        run: |
          python src/integrated/upsert_pgvector_embeddings.py

      - name: Check vector status
        working-directory: legal-data-pipeline
        run: |
          python src/check_vector_status.py